name: Deploy GitHub Pages
on:
  push:
    branches: [ "main" ]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build pages artifact
        run: |
          mkdir -p pages-site/panel
          cp -R github-pages/. pages-site/
          cp -R public/. pages-site/panel/
          cp -R ai-evolution-lab pages-site/ai-evolution-lab
          cp -R fikir-reaktoru pages-site/fikir-reaktoru
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site
      - id: deployment
        uses: actions/deploy-pages@v4
